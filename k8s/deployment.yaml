apiVersion: apps/v1
kind: Deployment

metadata:
  name: bmi-api
  labels:
    app: bmi-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bmi-api

  template:
    metadata:
      labels:
        app: bmi-api

    spec:
      containers:
        - name: bmi-api
          image: bmi-api:latest
          imagePullPolicy: Never

          ports:
            - name: http
              containerPort: 8081

          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          readinessProbe:
            httpGet:
              path: /api/bmi/75/175
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/bmi/75/175
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3